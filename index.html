<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --accent:#4FC3F7;--accent2:#81D4FA;--accent3:#B3E5FC;
  --purple:#CE93D8;--purple2:#E1BEE7;
  --glass:rgba(255,255,255,0.08);--glass2:rgba(255,255,255,0.12);--glass3:rgba(255,255,255,0.18);
  --glass-border:rgba(255,255,255,0.18);--glass-border2:rgba(255,255,255,0.28);
  --text:rgba(255,255,255,0.95);--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.30);
  --blur:blur(24px);--blur2:blur(40px);
  --r:16px;--r2:20px;--r3:28px;
}
html,body{height:100%;background:#000}
body{font-family:-apple-system,'SF Pro Display','SF Pro Text',system-ui,sans-serif;background:#000;overflow-x:hidden}

/* Фоновий градієнт */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.55}
.orb1{width:340px;height:340px;background:radial-gradient(circle,#1565C0,#0D47A1 60%,transparent);top:-60px;left:-80px}
.orb2{width:300px;height:300px;background:radial-gradient(circle,#4A148C,#6A1B9A 60%,transparent);top:120px;right:-60px}
.orb3{width:260px;height:260px;background:radial-gradient(circle,#006064,#00838F 60%,transparent);bottom:200px;left:20px}
.orb4{width:200px;height:200px;background:radial-gradient(circle,#1B5E20,#2E7D32 60%,transparent);bottom:80px;right:30px}

.app{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header — liquid glass */
.header{
  background:rgba(15,15,30,0.45);
  backdrop-filter:var(--blur2);
  -webkit-backdrop-filter:var(--blur2);
  border-bottom:0.5px solid var(--glass-border);
  padding:52px 20px 14px;
  display:flex;align-items:flex-end;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.logo{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1}
.logo span{background:linear-gradient(135deg,var(--accent2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.3px;margin-top:3px;font-weight:400}

.cart-btn{
  background:var(--glass2);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:0.5px solid var(--glass-border2);
  color:var(--text);border-radius:22px;
  padding:8px 16px;font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background 0.2s;
}
.cart-btn:hover{background:var(--glass3)}
.cart-badge{
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;border-radius:50%;
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
}

/* Categories */
.cats-wrap{
  background:rgba(10,10,20,0.35);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-bottom:0.5px solid var(--glass-border);
  padding:12px 16px;
  position:sticky;top:97px;z-index:9;
}
.cats{display:flex;gap:8px;overflow-x:auto}
.cats::-webkit-scrollbar{display:none}
.cat-btn{
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:0.5px solid var(--glass-border);
  color:var(--text2);
  padding:7px 18px;border-radius:22px;
  font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all 0.2s;
}
.cat-btn.active{
  background:linear-gradient(135deg,rgba(79,195,247,0.25),rgba(206,147,216,0.25));
  border-color:rgba(129,212,250,0.4);
  color:var(--accent2);
}

/* Products */
.products{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1}

.card{
  background:var(--glass);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:0.5px solid var(--glass-border);
  border-radius:var(--r2);
  padding:16px;display:flex;gap:14px;
  transition:background 0.2s,border-color 0.2s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
  border-radius:var(--r2);pointer-events:none;
}
.card:hover{background:var(--glass2);border-color:var(--glass-border2)}

.card-icon{
  width:54px;height:54px;border-radius:14px;
  background:var(--glass2);
  border:0.5px solid var(--glass-border2);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
  position:relative;overflow:hidden;
}
.card-icon::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
}

.card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.25;letter-spacing:-0.2px}

.badge{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600;letter-spacing:0.3px;flex-shrink:0}
.b-craft{
  background:linear-gradient(135deg,rgba(79,195,247,0.2),rgba(206,147,216,0.2));
  color:var(--accent2);border:0.5px solid rgba(79,195,247,0.3);
}
.b-new{
  background:rgba(102,187,106,0.18);color:#A5D6A7;border:0.5px solid rgba(102,187,106,0.3);
}
.b-hot{
  background:rgba(255,138,101,0.18);color:#FFAB91;border:0.5px solid rgba(255,138,101,0.3);
}

.card-desc{font-size:12px;color:var(--text2);line-height:1.55;font-weight:400}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.card-style{font-size:11px;color:var(--text3);font-weight:400}
.tag-abv{
  font-size:10px;
  background:rgba(79,195,247,0.12);
  color:var(--accent);
  padding:2px 7px;border-radius:8px;
  border:0.5px solid rgba(79,195,247,0.2);
  font-weight:500;
}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid rgba(255,255,255,0.08)}
.card-price{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.card-price small{font-size:11px;color:var(--text3);font-weight:400;letter-spacing:0;margin-left:2px}

.card-actions{display:flex;align-items:center;gap:8px}
.qty-btn{
  background:var(--glass2);
  border:0.5px solid var(--glass-border2);
  color:var(--text);width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;line-height:1;
  transition:background 0.15s;
}
.qty-btn:hover{background:var(--glass3)}
.qty-num{font-size:15px;font-weight:600;min-width:22px;text-align:center;color:var(--accent2)}
.add-btn{
  background:linear-gradient(135deg,rgba(79,195,247,0.2),rgba(206,147,216,0.2));
  border:0.5px solid rgba(129,212,250,0.35);
  color:var(--accent2);width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;line-height:1;
  transition:all 0.15s;
}
.add-btn:hover{background:linear-gradient(135deg,rgba(79,195,247,0.35),rgba(206,147,216,0.35))}

/* Cart */
.cart-panel{
  background:rgba(8,8,18,0.6);
  backdrop-filter:var(--blur2);
  -webkit-backdrop-filter:var(--blur2);
  border-top:0.5px solid var(--glass-border);
  padding:20px;display:none;
  position:sticky;bottom:0;z-index:10;
}
.cart-panel.open{display:block}
.cart-heading{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px;margin-bottom:14px}

.cart-item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.07);font-size:13px}
.cart-item:last-child{border-bottom:none}
.cart-item-name{color:var(--text);font-weight:500}
.cart-item-qty{font-size:11px;color:var(--text3);margin-left:6px}
.cart-item-price{color:var(--accent2);font-weight:600;font-size:14px}

.cart-sum{display:flex;justify-content:space-between;align-items:baseline;padding-top:14px;margin-top:4px;border-top:0.5px solid rgba(255,255,255,0.1)}
.cart-sum-label{font-size:13px;color:var(--text2);font-weight:400}
.cart-sum-value{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px}

.order-btn{
  width:100%;margin-top:14px;
  background:linear-gradient(135deg,rgba(79,195,247,0.35),rgba(206,147,216,0.35));
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:var(--text);
  border:0.5px solid rgba(129,212,250,0.4);
  border-radius:var(--r3);
  padding:15px;font-size:15px;font-weight:600;
  cursor:pointer;letter-spacing:-0.2px;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.order-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
  pointer-events:none;
}
.order-btn:hover{background:linear-gradient(135deg,rgba(79,195,247,0.5),rgba(206,147,216,0.5))}
.order-btn:disabled{background:var(--glass);border-color:var(--glass-border);color:var(--text3);cursor:not-allowed}
.order-btn:disabled::before{display:none}

.deposit-note{font-size:11px;color:var(--text3);text-align:center;margin-top:10px;font-weight:400}
.empty-cart{text-align:center;color:var(--text3);font-size:13px;padding:6px 0}
</style>

<div class="bg">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
  <div class="bg-orb orb4"></div>
</div>

<div class="app">
  <div class="header">
    <div>
      <div class="logo">🍺 <span>Beerka</span> Bar</div>
      <div class="logo-sub">розливне · вино · сидр</div>
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      Кошик <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>

  <div class="cats-wrap">
    <div class="cats" id="cats"></div>
  </div>

  <div class="products" id="products"></div>

  <div class="cart-panel" id="cartPanel">
    <div class="cart-heading">Ваше замовлення</div>
    <div id="cartItems"><div class="empty-cart">Кошик порожній</div></div>
    <div class="cart-sum">
      <span class="cart-sum-label">Разом</span>
      <span class="cart-sum-value" id="cartTotal">0 грн</span>
    </div>
    <button class="order-btn" id="orderBtn" onclick="placeOrder()" disabled>Оформити замовлення</button>
    <div class="deposit-note" id="depositNote"></div>
  </div>
</div>

<script>
const cats=[
  {id:'beer',label:'🍺 Пиво'},
  {id:'wine',label:'🍷 Вино'},
  {id:'cider',label:'🍏 Сидр'},
  {id:'snacks',label:'🥜 Снеки'},
];
const products={
  beer:[
    {id:'b1',icon:'🍺',name:'Варшавське Живе',desc:'Легкий лагер з м\'яким солодовим смаком і мінімальною гіркотою. Класика на щодень.',meta:'Лагер · Польща',abv:'5.2%',price:85,badge:''},
    {id:'b2',icon:'🍺',name:'Правда Львів IPA',desc:'Насичений хоп-характер з цитрусовими та тропічними нотами. Яскраво гірке.',meta:'West Coast IPA · Україна',abv:'6.8%',price:95,badge:'hot'},
    {id:'b3',icon:'🍺',name:'Бочкове темне',desc:'Дункель зі смаком темного хліба, карамелі та легкої підсмаженості. Оксамитове.',meta:'Дункель · Чехія',abv:'4.9%',price:80,badge:''},
    {id:'b4',icon:'🍺',name:'Paulaner Weizen',desc:'Баварське пшеничне з банановими та гвоздиковими ефірами. Освіжає і насичує.',meta:'Пшеничне · Німеччина',abv:'5.5%',price:110,badge:'craft'},
    {id:'b5',icon:'🍺',name:'Hop Hey Blanche',desc:'Бельгійське біле з коріандром і цедрою апельсина. Легке і ароматне.',meta:'Witbier · Україна',abv:'4.5%',price:90,badge:'new'},
    {id:'b6',icon:'🍺',name:'Козацьке Золоте',desc:'Класичний лагер із зернистим солодовим смаком. Чисте, освіжаюче, без зайвого.',meta:'Lager · Україна',abv:'4.8%',price:75,badge:''},
    {id:'b7',icon:'🍺',name:'Velvet Stout',desc:'Ірландський стаут з кавовими та шоколадними нотами. Густий, але питний.',meta:'Dry Stout · Ірландія',abv:'4.3%',price:100,badge:'craft'},
  ],
  wine:[
    {id:'w1',icon:'🍷',name:'Шабо Класичне',desc:'Шардоне з нотами зелених яблук і легкою мінеральністю. Сухе, збалансоване.',meta:'Шардоне · Шабо, Україна',abv:'12.5%',price:220,badge:''},
    {id:'w2',icon:'🍷',name:'Marani Алазані',desc:'Ніжне напівсолодке з фруктовим букетом: персик, абрикос, квіткові ноти.',meta:'Купаж · Кахетія, Грузія',abv:'11%',price:260,badge:'new'},
    {id:'w3',icon:'🍷',name:'Aligoté Золота Балка',desc:'Легке сухе з освіжаючою кислинкою і ароматом білих квітів.',meta:'Aligoté · Крим, Україна',abv:'11.5%',price:180,badge:''},
    {id:'w4',icon:'🍷',name:'Inkerman Каберне',desc:'Повнотіле сухе червоне з нотами темних ягід, тютюну і дубу.',meta:'Каберне Совіньйон · Україна',abv:'13%',price:200,badge:''},
    {id:'w5',icon:'🍷',name:'Château Vartely',desc:'Елегантне молдовське напівсухе з ягідним фруктовим букетом.',meta:'Купаж · Молдова',abv:'12%',price:240,badge:'craft'},
    {id:'w6',icon:'🍷',name:'Тераса Рожеве',desc:'Делікатне рожеве з нотами суниці та грейпфрута. Ідеал для літнього вечора.',meta:'Совіньйон Блан · Україна',abv:'12%',price:190,badge:'new'},
  ],
  cider:[
    {id:'c1',icon:'🍏',name:'Somersby Apple',desc:'Класичний яблучний сидр — свіжий, солодкуватий, освіжаючий. Легко п\'ється.',meta:'Яблучний · Данія',abv:'4.5%',price:65,badge:''},
    {id:'c2',icon:'🍏',name:'Bohemia Груша',desc:'М\'який грушевий сидр із соковитим фруктовим смаком і легкою солодкістю.',meta:'Грушевий · Чехія',abv:'4.2%',price:70,badge:'new'},
    {id:'c3',icon:'🍏',name:'Karhu Ягідний',desc:'Фінський сидр із ягідним міксом: чорниця, смородина, журавлина.',meta:'Ягідний · Фінляндія',abv:'4.7%',price:72,badge:''},
    {id:'c4',icon:'🍏',name:'Cidre Royal Brut',desc:'Сухий французький сидр з характером: мінеральний, хрусткий, майже як шампанське.',meta:'Брют · Нормандія, Франція',abv:'5.5%',price:95,badge:'craft'},
    {id:'c5',icon:'🍏',name:'Happy Joe Лемон',desc:'Освіжаючий лимонний сидр з приємною кислинкою і ніжним цитрусовим ароматом.',meta:'Лимонний · Фінляндія',abv:'4.0%',price:68,badge:''},
    {id:'c6',icon:'🍏',name:'Frutteto Персик',desc:'Соковитий персиковий сидр — солодкий, ароматний, легкий. Підходить для новачків.',meta:'Персиковий · Польща',abv:'3.8%',price:62,badge:'new'},
    {id:'c7',icon:'🍏',name:'Craft Cider Малина',desc:'Українська малина, натуральний сік. Яскравий ягідний смак, легка кислинка.',meta:'Малиновий · Україна',abv:'4.5%',price:75,badge:'craft'},
  ],
  snacks:[
    {id:'s1',icon:'🥜',name:'Арахіс смажений',desc:'Солоний смажений арахіс. Хрусткий, ситний, найкращий друг пива.',meta:'Солоний · 150г',price:45,badge:''},
    {id:'s2',icon:'🍞',name:'Сухарики Lviv',desc:'Часникові пшеничні сухарики зі спеціями. Хрумтять, не розсипаються.',meta:'Часниковий · 100г',price:38,badge:''},
    {id:'s3',icon:'🌽',name:'Снеки кукурудзяні',desc:'Гострі кукурудзяні снеки з паприкою та чілі. Відчутне гостре пекло.',meta:'Гострі · 120г',price:42,badge:'hot'},
    {id:'s4',icon:'🥔',name:'Чіпси Lays',desc:'Тонкі картопляні чіпси з паприкою. Легкі і хрусткі, зупинитись неможливо.',meta:'Паприка · 133г',price:55,badge:''},
    {id:'s5',icon:'🐟',name:'В\'ялена риба',desc:'Лящ або окунь власного в\'ялення. Щільний, солоний, ідеально до пива.',meta:'Лящ · 150г',price:95,badge:'hot'},
    {id:'s6',icon:'🧀',name:'Нарізка сирна',desc:'Гауда + Едам, слайси. Ніжний вершковий смак. Добре до вина і сидру.',meta:'Гауда + Едам · 200г',price:120,badge:''},
    {id:'s7',icon:'🦑',name:'Кальмар сушений',desc:'Сушені смужки кальмара з легким сольовим смаком. Морська закуска №1.',meta:'Смужки · 100г',price:85,badge:''},
  ],
};

let activeCat='beer',cart={};

function renderCats(){
  document.getElementById('cats').innerHTML=cats.map(c=>
    `<button class="cat-btn${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function cardActionsHtml(p,q){
  return q>0
    ?`<div class="card-actions"><button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button><span class="qty-num">${q}</span><button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button></div>`
    :`<div class="card-actions"><button class="add-btn" onclick="addItem('${p.id}')">+</button></div>`;
}

function renderProducts(){
  const items=products[activeCat]||[];
  document.getElementById('products').innerHTML=items.map(p=>{
    const q=cart[p.id]||0;
    const bLabel={craft:'Craft',new:'Нове',hot:'Топ'}[p.badge]||'';
    const bClass={craft:'b-craft',new:'b-new',hot:'b-hot'}[p.badge]||'';
    const badgeHtml=bLabel?`<span class="badge ${bClass}">${bLabel}</span>`:'';
    const abvHtml=p.abv?`<span class="tag-abv">${p.abv}</span>`:'';
    const priceLabel=activeCat==='snacks'?'пач.':'л';
    return`<div class="card" id="card-${p.id}">
      <div class="card-icon">${p.icon}</div>
      <div class="card-body">
        <div class="card-top"><div class="card-name">${p.name}</div>${badgeHtml}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-meta"><span class="card-style">${p.meta}</span>${abvHtml}</div>
        <div class="card-footer">
          <div class="card-price">${p.price} грн<small> / ${priceLabel}</small></div>
          ${cardActionsHtml(p,q)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCat(id){activeCat=id;renderCats();renderProducts();}
function allProducts(){return Object.values(products).flat();}
function addItem(id){cart[id]=(cart[id]||0)+1;updateBadge();refreshCard(id);}

function changeQty(id,d){
  cart[id]=(cart[id]||0)+d;
  if(cart[id]<=0)delete cart[id];
  updateBadge();refreshCard(id);
  if(document.getElementById('cartPanel').classList.contains('open'))renderCart();
}

function refreshCard(id){
  const p=allProducts().find(x=>x.id===id);
  const card=document.getElementById('card-'+id);
  if(!p||!card)return;
  const footer=card.querySelector('.card-footer');
  const priceLabel=['s1','s2','s3','s4','s5','s6','s7'].includes(id)?'пач.':'л';
  footer.innerHTML=`<div class="card-price">${p.price} грн<small> / ${priceLabel}</small></div>${cardActionsHtml(p,cart[id]||0)}`;
}

function updateBadge(){
  document.getElementById('cartCount').textContent=Object.values(cart).reduce((a,b)=>a+b,0);
}

function renderCart(){
  const all=allProducts(),keys=Object.keys(cart),el=document.getElementById('cartItems');
  const btn=document.getElementById('orderBtn'),note=document.getElementById('depositNote');
  if(!keys.length){
    el.innerHTML='<div class="empty-cart">Кошик порожній</div>';
    document.getElementById('cartTotal').textContent='0 грн';
    note.textContent='';btn.disabled=true;return;
  }
  let sum=0;
  el.innerHTML=keys.map(id=>{
    const p=all.find(x=>x.id===id);if(!p)return'';
    const line=p.price*cart[id];sum+=line;
    return`<div class="cart-item">
      <span><span class="cart-item-name">${p.name}</span><span class="cart-item-qty">× ${cart[id]}</span></span>
      <span class="cart-item-price">${line} грн</span>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent=sum+' грн';
  note.textContent=`Передоплата при оформленні — ${Math.round(sum*0.5)} грн (50%)`;
  btn.disabled=false;
}

function toggleCart(){
  const p=document.getElementById('cartPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))renderCart();
}

function placeOrder(){
  const all=allProducts(),keys=Object.keys(cart);
  if(!keys.length)return;
  const sum=keys.reduce((a,id)=>{const p=all.find(x=>x.id===id);return a+(p?p.price*cart[id]:0);},0);
  const list=keys.map(id=>{const p=all.find(x=>x.id===id);return p?`${p.name} ×${cart[id]}`:''}).filter(Boolean).join(', ');
  alert(`✅ Замовлення прийнято!\n\n${list}\n\nСума: ${sum} грн\nПередоплата: ${Math.round(sum*0.5)} грн\n\nМенеджер зв'яжеться для підтвердження.`);
  cart={};updateBadge();renderProducts();
  document.getElementById('cartPanel').classList.remove('open');
}

renderCats();renderProducts();
</script>
